<body>
    <div id="contenedor">
        <div class="elemento">Seccion 1</div>
        <div class="elemento">Seccion 2</div>
        <div class="elemento">Seccion 3</div>
        <div class="elemento">Seccion 4</div>

    </div>
    <div id="encabezado"></div>

    <button id="btnLibro3">Obtener libro 3</button>
    <button id="btnArtista1">Obtener artista 1</button>
    <button id="btnArtista2">Obtener artista 2</button>
    <style>
        
    </style>
    <script>
        /*

        let d = document.createElement("p");

        async function obtenerJSON(i) {
            const respuesta = await fetch('http://openlibrary.org/subjects/love.json?pusblished_in=1500-1600');
            const datos = await respuesta.json();
            d.textContent = datos.works[i].title;
            document.getElementById("encabezado").appendChild(d);
            img.src = "";
            console.log(datos);
        }

        let img = document.createElement("img");

        async function obtenerArtista(artistName) {
            const respuesta = await fetch('https://www.theaudiodb.com/api/v1/json/123/search.php?s=' + artistName);
            const datos = await respuesta.json();
            d.textContent = datos.artists[0].strBiographyES;
            document.getElementById("encabezado").appendChild(d);
            img.src = datos.artists[0].strArtistThumb;
            document.getElementById("encabezado").appendChild(img);
            console.log(datos);


        }

        obtenerJSON(4);

        document.getElementById("btnLibro3").addEventListener("click", function () {
            obtenerJSON(3);
        });

        //Biografia e imagen del artista
        document.getElementById("btnArtista1").addEventListener("click", function () {
            obtenerArtista("ColdPlay");
        });

        document.getElementById("btnArtista2").addEventListener("click", function () {
            obtenerArtista("the beatles");
        });

    </script>
</body>
